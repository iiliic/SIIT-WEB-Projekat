</header>

                <button type="submit" class="buttonStyle">Пријави се</button>
            </form>
        <button id="closeLogin" class="buttonStyle">Затвори</button>
        </div>
    </div>

    <div class="signin" id="signin">

                <input type="password" id="signin-lozinka" name="lozinka" class="inputStyle"><br>
                <button type="submit" class="buttonStyle">Региструј се</button>
