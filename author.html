<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>Аутор</title>
    <link rel="stylesheet" href="shared-style.css">
    <link rel="stylesheet" href="author-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header>
    <div class="logo-container" id="logo-container">
        <img src="content/Logo.png" alt="Logo" class="logo">
    </div>

    <div class="header-right" id="header-right">
    </div>
</header>


<div class="sidebar">
    <div class="sidebar-content">
            <div class="navigation-part">
                <p class="text big">Навигација</p>
                <div class="nav-links">
                    <a href="profile.html" class="nav-link">➜ Профил</a>
                    <a href="lista-knjiga.html" class="nav-link">➜ Књиге</a>
                    <a href="admin-lista-knjiga.html" class="nav-link"> ➜ Админ књиге</a>
                    <a href="author-list.html" class="nav-link">➜ Аутори</a>
                    <a href="author-admin-list.html" class="nav-link"> ➜ Админ аутори</a>
                </div>
            </div>
    </div>
</div>


<main>
    <div class="return-container">
        <a href="author-list.html" class="return text big">⬅ Назад на ауторе</a>
    </div>
    <div class="author-container">
        <div class="author-main">
            <div class="author-image-container">
                <img src="" alt="Аутор" class="author-image" id="slika">
            </div>
            <div class="author-text-container">
                <div class="author-name">
                    <p class="text huge thick" id="ime"></p>
                </div>
                <div class="author-description">
                    <p class="text big">О писцу:</p>
                    <p class="text faded" id="biografija"></p>
                </div>
            </div>
            <div class="author-stats-container">
                <div class="stat">
                    <p class="text">Рођен:</p>
                    <p class="text faded" id="datumRodjenja"></p>
                </div>
                <div class="stat">
                    
                    <p class="text">Статус:</p>
                    <p class="text faded" id="status"></p>
                </div>
                <div class="stat">
                    
                    <p class="text">Продато:</p>
                    <p class="text faded" id="napisano"></p>
                </div>
                <div class="stat">
                    <p class="text">Награде:</p>
                    <p class="text faded" id="nagrade"></p>
                </div>
            </div>
            <div class="author-raiting-container">
                <div class="rating-average">
                    <p class="text big">Просечна оцена:</p>
                    <p class="text ginormous thick">4.6</p>
                </div>
                <div class="rating">
                    <p class="text">Остави оцену</p>
                    <div class="stars">
                        <input type="radio" id="star5" name="rating" value="5">
                        <label for="star5">★</label>

                        <input type="radio" id="star4" name="rating" value="4">
                        <label for="star4">★</label>

                        <input type="radio" id="star3" name="rating" value="3">
                        <label for="star3">★</label>

                        <input type="radio" id="star2" name="rating" value="2">
                        <label for="star2">★</label>

                        <input type="radio" id="star1" name="rating" value="1">
                        <label for="star1">★</label>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="book-list-container">
        <p class="text big thick">Дела:</p>
        <div class="book-list" id="book-list">
        </div>
    </div>
</main>

<script type="module" src="function.js"></script>
<script type="module" src="author.js"></script>
</body>
</html>
