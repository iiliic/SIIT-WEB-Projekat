<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>Књиге</title>
    <link rel="stylesheet" href="../css/shared-style.css">
    <link rel="stylesheet" href="../css/lista-kniga.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- HEADER (LOGO, LOGIN I SIGNUP DUGMAD) -->
<header>
    <div class="logo-container" id="logo-container">
        <img src="../content/Logo.png" alt="Logo" class="logo">
    </div>
    <div class="header-right" id="header-right">
    </div>
</header>

<!-- SIDEBAR NAVIGACIJA -->
<div class="sidebar">
    <div class="sidebar-content">
            <div class="navigation-part">
                <p class="text big">Навигација</p>
                <div class="nav-links">
                    <a href="profile.html" class="nav-link">➜ Профил</a>
                    <a href="lista-knjiga.html" class="nav-link active">➜ Књиге</a>
                    <a href="admin-lista-knjiga.html" class="nav-link"> ➜ Админ књиге</a>
                    <a href="author-list.html" class="nav-link">➜ Аутори</a>
                    <a href="author-admin-list.html" class="nav-link"> ➜ Админ аутори</a>
                </div>
            </div>

        <!--FILTRI -->
        <div class="filteri-part">
            <p class="text big">Филтери књига</p>
            <!-- DROPDOWN ZA ZANR -->
            <div class="filteri-group">
                <button class="dropdown-toggle button-style" onclick="toggleDropdown('zanr-dropdown')">Жанр ▾</button>

                <div class="dropdown-menu" id="zanr-dropdown">
                    <div class="checkbox-group">
                        <input type="checkbox" id="zanr-domaći-autori" value="Domaći autori">
                        <label for="zanr-domaći-autori" class="text">Класика</label>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="zanr-drama" value="Drama">
                        <label for="zanr-drama" class="text">Наука</label>
                    </div>  
                    <div class="checkbox-group">
                        <input type="checkbox" id="zanr-istorijski" value="Istorijski">
                        <label for="zanr-istorijski" class="text">Филозофија</label>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="zanr-trileri" value="Trileri">
                        <label for="zanr-trileri" class="text">Научна фантастика</label>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="zanr-romantika" value="Romantika">
                        <label for="zanr-romantika" class="text">Биографија</label>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="zanr-naučna-fantastika" value="Naučna fantastika">
                        <label for="zanr-naučna-fantastika" class="text">Књижевност</label>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="zanr-nauka" value="Nauka">
                        <label for="zanr-nauka" class="text">Бизнис</label>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="zanr-klasici" value="Klasici">
                        <label for="zanr-klasici" class="text">Технологија</label>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="zanr-klasici" value="Klasici">
                        <label for="zanr-klasici" class="text">Психологија</label>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="zanr-klasici" value="Klasici">
                        <label for="zanr-klasici" class="text">Историја</label>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="zanr-klasici" value="Klasici">
                        <label for="zanr-klasici" class="text">Поезија</label>
                    </div>
                </div>
            </div>
        </div>   
    </div>
</div>


<main>
    <!-- DEO ZA SEARCH -->
    <div class="search-hero">
        <h1 class="hero-title">Откриј своју <span class="highlight">следећу омиљену</span> књигу </h1>
        <div class="search-bar-main">
            <input type="text" id="pretraga" placeholder="Претражи по називу књиге..." class="input-style search-input">
            <button class="image-button" onclick="pretraziKnjige()">
                <img src="../content/Search.png" alt="Претрага" class="button-image">
            </button>
        </div>
    </div>

    <!-- KNJIGE -->
    <h1 class="book-grid-title">Каталог књига</h1>
    <div class="container middle" id="books-container">
    
    </div>
</main>
<script type="module"src="../js/function.js"></script>
<script type="module" src="../js/lista-knjiga.js"></script>
<script>
    function toggleDropdown(id) {
    const menu = document.getElementById(id);
    menu.classList.toggle('open');
    }
</script>
</body>
</html>
