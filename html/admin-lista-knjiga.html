<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>Админ пермисије</title>
    <link rel="stylesheet" href="../css/shared-style.css">
    <link rel="stylesheet" href="../css/admin-lista-knjiga.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header>
    <div class="logo-container" id="logo-container">
        <img src="../content/Logo.png" alt="Logo" class="logo">
    </div>
    <div class="header-right" id="header-right">
    </div>
</header>

    <div class="sidebar">
        <div class="sidebar-content">
                <div class="navigation-part">
                    <p class="text big">Навигација</p>
                    <div class="nav-links">
                        <a href="profile.html" class="nav-link">➜ Профил</a>
                        <a href="lista-knjiga.html" class="nav-link">➜ Књиге</a>
                        <a href="admin-lista-knjiga.html" class="nav-link active"> ➜ Админ књиге</a>
                        <a href="author-list.html" class="nav-link">➜ Аутори</a>
                        <a href="author-admin-list.html" class="nav-link "> ➜ Админ аутори</a>
                    </div>
                </div>

            <div class="function-part">
                <p class="text big">Опције</p>
                    <div class="function-list">
                        <button class="button-style">Додај</button>
                        <button class="button-style">Измени</button>
                        <button class="button-style">Обриши</button>
                    </div>
            </div>
        </div>
    </div>

<main>
    <!-- DEO ZA SEARCH -->
    <div class="search-hero">
        <h1 class="hero-title">Претрага књига за промену</h1>
        <div class="search-bar-main">
            <input type="text" id="pretraga" placeholder="Претражи по називу књиге..." class="input-style search-input">
            <button class="image-button" onclick="pretraziKnjige()">
                <img src="../content/Search.png" alt="Претрага" class="button-image">
            </button>
        </div>
    </div>

    <h1 class="all-books-title">Све књиге</h1>


    <div class="table-container">
    <!-- HEADER -->
        <div class="table-header">
            <div class="table-element"><p class="text">Назив</p></div>
            <div class="table-element"><p class="text">Жанр</p></div>
            <div class="table-element"><p class="text">Формат</p></div>
            <div class="table-element"><p class="text">Цена</p></div>
            <div class="table-element"><p class="text">Број страница</p></div>
            <div class="table-element"><p class="text">ИД Аутора</p></div>
            <div class="table-element"><p class="text">ISBN број</p></div>
        </div>

        <!-- REDOVI -->
        <div  id="tableBody">
            <!-- Dinamički generisani redovi će se pojaviti ovde -->
        </div>

</main>

<script type="module" src="../js/function.js"></script>
<script type="module" src="../js/admin-lista-knjiga.js"></script>
</body>
</html>
