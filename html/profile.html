<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>Аутори</title>
    <link rel="stylesheet" href="../css/shared-style.css">
    <link rel="stylesheet" href="../css/profile.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<header>
    <div class="logo-container" id="logo-container">
        <img src="../content/Logo.png" alt="Logo" class="logo" id="logo">
    </div>

    <div class="header-right" id="header-right">
    </div>
</header>

<div class="sidebar">
    <div class="sidebar-content">
            <div class="navigation-part">
                <p class="text big">Навигација</p>
                <div class="nav-links">
                    <a href="profile.html" class="nav-link active">➜ Профил</a>
                    <a href="lista-knjiga.html" class="nav-link">➜ Књиге</a>
                    <a href="admin-lista-knjiga.html" class="nav-link"> ➜ Админ књиге</a>
                    <a href="author-list.html" class="nav-link">➜ Аутори</a>
                    <a href="author-admin-list.html" class="nav-link"> ➜ Админ аутори</a>
                </div>
            </div>
    </div>
</div>


<main>
    <div class="profile-info-container">
        <p class="text big"> Улогован као:</p>
        <div class="profile-info">
            <div class="info-element">
                <p class="text">Корисничко име</p>
                <p class="text faded" id="korisnickoIme">Пријавите се</p>
            </div>
            <div class="info-element">
                <p class="text">Име и Презиме</p>
                <p class="text faded" id="ime">Пријавите се</p>
            </div>
            <div class="info-element">
                <p class="text">Имејл адреса</p>
                <p class="text faded" id="email">Пријавите се</p>
            </div>
             <div class="info-element">
                <p class="text">Датум рођења:</p>
                <p class="text faded" id="datumRodjenja">Пријавите се</p>
            </div>
            <div class="info-element">
                <p class="text">Адреса</p>
                <p class="text faded" id="adresa">Пријавите се</p>
            </div>
            <div class="info-element">
                <p class="text">Заниманје:</p>
                <p class="text faded" id="zanimanje">Пријавите се</p>
            </div>
        </div>
    </div>
    <div class="rating-and-review-container">
        <div class="rating-container" id="rating-container">
            <div class="rating-title">
                <p class="text big">Моје Оцене:</p>
            </div>
        </div>

        <div class="review-container" id="review-container">
            <div class="review-title">
                <p class="text big">Моје Рецензије:</p>
            </div>
        </div>

</main>
<script type="module"src="../js/function.js"></script>
<script type="module"src="../js/profile.js"></script>
</body>
</html>
