<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>Админ пермисије</title>
    <link rel="stylesheet" href="../css/shared-style.css">
    <link rel="stylesheet" href="../css/author-admin-list-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header>
    <div class="logo-container" id="logo-container">
        <img src="../content/Logo.png" alt="Logo" class="logo">
    </div>

    <div class="header-right" id="header-right">
    </div>
</header>

<div class="sidebar">
    <div class="sidebar-content">
            <div class="navigation-part">
                <p class="text big">Навигација</p>
                <div class="nav-links">
                    <a href="profile.html" class="nav-link">➜ Профил</a>
                    <a href="lista-knjiga.html" class="nav-link">➜ Књиге</a>
                    <a href="admin-lista-knjiga.html" class="nav-link"> ➜ Админ књиге</a>
                    <a href="author-list.html" class="nav-link">➜ Аутори</a>
                    <a href="author-admin-list.html" class="nav-link active"> ➜ Админ аутори</a>
                </div>
            </div>
        <div class="search-part">
            <p class="text big">Претрага аутора</p>
            <form action="#" method="get">
                <div class="search">
                    <div class="label-above-input">
                        <label for="pretraga" class="text">Претражи:</label>
                        <div class="search-bar">
                            <input type="text" id="pretraga" name="pretraga" placeholder="Унеси нешто" class="input-style">
                            <button type="submit" class="image-button"><img src="../content/Search.png" alt="Претрага" class="button-image"></button>
                        </div>
                    </div>
                </div>
            </form>
        </div>

        <div class="function-part">
            <p class="text big">Опције</p>
                <div class="function-list">
                <form action="a" method="post">
                    <button class="button-style">Додај</button>
                </form>
                
                <form action="b" method="post">
                    <button class="button-style">Измени</button>
                </form>

                <form action="c" method="post">
                    <button class="button-style">Обриши</button>
                </form>
                </div>
        </div>
    </div>
</div>


<main>
    <div class="container" id="container">
        <button class="table-header">
            <div class="item-element">
                <p class="text">ИД</p>
            </div>
            <div class="item-element">
                <p class="text">Име</p>
            </div>
            <div class="item-element">
                <p class="text">Презиме</p>
            </div>
            <div class="item-element">
                <p class="text">Датум</p>
            </div>
            <div class="item-element">
                <p class="text">Статус</p>
            </div>
            <div class="item-element">
                <p class="text">Награде</p>
            </div>
            <div class="item-element">
                <p class="text">Продато</p>
            </div>
            <div class="item-element">
                <p class="text">Менаџер</p>
            </div>
        </button>
    </div>

</main>
<script type="module" src="../js/function.js"></script>
<script type="module" src="../js/author-admin-list.js"></script>
</body>
</html>
