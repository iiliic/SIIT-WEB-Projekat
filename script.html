      "tekst": "Шекспирова драма која никада не стари. Питање 'бити или не бити' и даље погађа суштину људског постојања.",
      "datum": "2025-03-08",
      "idKnjige": "knj024",
      "idKorisnika": "kor006"
    },
    "rec094": {
      "tekst": "Пупинова аутобиографија је изузетно мотивишућа. Како један дечак из малог села може да постане један од највећих светских научника захваљујући раду и упорности.",
      "datum": "2025-04-22",
      "idKnjige": "knj025",
      "idKorisnika": "kor007"
    },
    "rec095": {
      "tekst": "Миланковић је био велики визионар. Његов опис свемира и времена је тако поетичан да заборавите да је ово заправо научна књига.",
      "datum": "2025-05-12",
      "idKnjige": "knj027",
      "idKorisnika": "kor008"
    },
    "rec096": {
      "tekst": "Витгенштајн не нуди лаке одговоре, али вас тера да размислите о језику на начин на који никада раније нисте.",
      "datum": "2025-06-18",
      "idKnjige": "knj028",
      "idKorisnika": "kor003"
    },
    "rec097": {
      "tekst": "Трактат о људској патњи и слободи. Достојевски је био највећи психолог међу писцима, а ова књига је најбољи доказ за то.",
      "datum": "2025-07-25",
      "idKnjige": "knj031",
      "idKorisnika": "kor001"
    },
    "rec098": {
      "tekst": "Пекићев трилер о вирусу беснила је невероватно напет. Аеродром као место где се руши цела цивилизација је сјајна метафора.",
      "datum": "2025-08-30",
      "idKnjige": "knj033",
      "idKorisnika": "kor010"
    },
    "rec099": {
      "tekst": "Вуков рад на очувању наше народне баштине је непроцењив. Ове песме су темељ наше културе и језика.",
      "datum": "2025-09-14",
      "idKnjige": "knj035",
      "idKorisnika": "kor007"
    },
    "rec100": {
      "tekst": "Шолохов је мајсторски приказао сурову ратну стварност. Прича о човеку који је све изгубио, а опет пронашао снагу да настави даље.",
      "datum": "2025-10-05",
      "idKnjige": "knj042",
      "idKorisnika": "kor009"
    },
    "rec101": {
      "tekst": "Фауст је дело које ме изнова фасцинира својом слојевитошћу. Свако читање открива нове филозофске дилеме о којима вреди размишљати недељама.",
      "datum": "2024-03-12",
      "idKnjige": "knj000",
      "idKorisnika": "kor001"
    },
    "rec102": {
      "tekst": "Мефистофелес је заправо најискренији лик у књизи. Гете је успео да кроз њега прикаже све оне циничне, али истините аспекте људске природе.",
      "datum": "2024-05-22",
      "idKnjige": "knj000",
      "idKorisnika": "kor002"
    },
    "rec103": {
      "tekst": "Књига која поставља суштинско питање: шта смо све спремни да жртвујемо за тренутак апсолутног задовољства? Безвременско ремек-дело.",
      "datum": "2024-08-14",
      "idKnjige": "knj000",
      "idKorisnika": "kor003"
    },
    "rec104": {
      "tekst": "Први део је динамичнији и лакши за праћење, док је други део права симболичка енигма. Ово је књига за цео живот.",
      "datum": "2024-11-05",
      "idKnjige": "knj000",
      "idKorisnika": "kor004"
    },
    "rec105": {
      "tekst": "Трагедија која превазилази границе времена. Гетеов језик је моћан, а симболика толико богата да вас потпуно увуче у свој свет.",
      "datum": "2025-01-20",
      "idKnjige": "knj000",
      "idKorisnika": "kor005"
    },
    "rec106": {
      "tekst": "Борба за људску душу никада није била боље описана. Свака реченица одише дубоком мудрошћу и животним искуством.",
      "datum": "2025-04-18",
      "idKnjige": "knj000",
      "idKorisnika": "kor006"
    },
    "rec107": {
      "tekst": "Фаустова жеља за знањем је инспиративна, али и опомињућа. Књига која тера на озбиљну интроспекцију и преиспитивање сопствених вредности.",
      "datum": "2025-07-30",
      "idKnjige": "knj000",
      "idKorisnika": "kor007"
    },
    "rec108": {
      "tekst": "Један од оних наслова који чине стуб светске цивилизације. Гете је савршено ухватио дух модерног човека који је вечито незадовољан достигнутим.",
      "datum": "2025-10-12",
      "idKnjige": "knj000",
      "idKorisnika": "kor008"
    },
    "rec109": {
      "tekst": "Изузетно захтевно, али и невероватно награђујуће читалачко искуство. Фауст је огледало свих наших тежњи и падова.",
      "datum": "2026-02-14",
      "idKnjige": "knj000",
      "idKorisnika": "kor009"
    },
    "rec110": {
      "tekst": "Мефистова духовитост и цинизам су савршен контраст Фаустовом патосу. Генијално написана драма која се не сме заобићи.",
      "datum": "2026-05-02",
      "idKnjige": "knj000",
      "idKorisnika": "kor010"
    },
    "rec111": {
      "tekst": "Невероватно је колико је Тесла био испред свог времена. Посматрао је људску цивилизацију кроз објектив енергије читавих 64 године пре него што је Кардашев уопште осмислио своју скалу. Његова предвиђања су данас стварност – уз роботе и вештачку интелигенцију, наша способност да контролишемо и користимо енергију коначно достиже ниво који оправдава ширење у свемир.",
      "datum": "2024-03-25",
      "idKnjige": "knj001",
      "idKorisnika": "kor001"
    },
    "rec112": {
      "tekst": "Овај есеј је прави визионарски путоказ. Тесла не само да је био научник, већ и дубоки мислилац који је разумео нераскидиву повезаност материје, кретања и људског духа кроз концепт енергије.",
      "datum": "2024-05-14",
      "idKnjige": "knj001",
      "idKorisnika": "kor002"
    },
    "rec113": {
      "tekst": "Сваки инжењер би ово требало да прочита барем једном. Теслин стил писања је кристално јасан, а његове идеје о директном искоришћавању сунчеве енергије су и данас невероватно актуелне.",
      "datum": "2024-08-20",
      "idKnjige": "knj001",
      "idKorisnika": "kor003"
    },
    "rec114": {
      "tekst": "Књига која ме је натерала да потпуно другачије посматрам ресурсе којима располажемо. Теслин оптимизам у вези са научним напретком је заиста заразан и инспиративан за младе истраживаче.",
      "datum": "2024-11-05",
      "idKnjige": "knj001",
      "idKorisnika": "kor004"
    },
    "rec115": {
      "tekst": "Фасциниран сам дубином филозофске анализе коју Тесла овде спроводи. Његово разумевање енергетских токова као техничке основе за трајни мир у свету је нешто што нам данас очајнички недостаје.",
      "datum": "2025-01-12",
      "idKnjige": "knj001",
      "idKorisnika": "kor006"
    },
    "rec116": {
      "tekst": "Тесла је у овом делу више филозоф него проналазач. Његова теорија о повећању људске масе кроз знање и енергију је јединствен допринос светској мисли који заслужује много већу пажњу.",
      "datum": "2025-02-28",
      "idKnjige": "knj001",
      "idKorisnika": "kor007"
    },
    "rec117": {
      "tekst": "Ово је темељ модерног размишљања о одрживости и еволуцији. Невероватно је како је Тесла предвидео готово све велике енергетске проблеме којима се бавимо више од једног века касније.",
      "datum": "2025-04-10",
      "idKnjige": "knj001",
      "idKorisnika": "kor008"
    },
    "rec118": {
      "tekst": "Тесла је био истински човек будућности. Читајући овај есеј, осећате се као да имате привилегију да завирите у ум који је јасно видео столећима унапред и разумео механизме универзума.",
      "datum": "2025-06-15",
      "idKnjige": "knj001",
      "idKorisnika": "kor009"
    },
    "rec119": {
      "tekst": "Кратко, али изузетно моћно штиво које мења поглед на свет. Тесла нам поручује да је прогрес човечанства неминован само ако научимо како да каналишемо природне силе на прави начин.",
      "datum": "2025-09-02",
      "idKnjige": "knj001",
      "idKorisnika": "kor010"
    }
  },
