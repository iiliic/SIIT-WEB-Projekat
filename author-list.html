<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>Аутори</title>
    <link rel="stylesheet" href="shared-style.css">
    <link rel="stylesheet" href="author-list-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header>
    <div class="logo-container" onclick="goToListaKnjiga()">
        <img src="content/Logo.png" alt="Logo" class="logo">
    </div>

    <div class="header-right">
        <button id="openLogin" class="button-style">Пријави  се</button>
        <button id="openSignin" class="button-style">Региструј се</button>
    </div>
</header>

    <div class="login" id="login">
        <div class="popup-content-position">
            <div class="popup-header">
                <p class="text huge">Пријава</p>
                <button id="closeLogin" class="button-style">X</button>
            </div>
            <div class="popup-content">
            <form action="#" method="post">
                <div class="label-above-input">
                    <label for="login-ime" class="text">Име:</label>
                    <input type="text" id="login-ime" name="ime" class="input-style"><br>
                </div>
                <div class="label-above-input">
                    <label for="login-lozinka" class="text">Лозинка:</label>
                    <input type="password" id="login-lozinka" name="lozinka" class="input-style"><br>
                </div>
                <div class="popup-button-container">
                    <button type="submit" class="button-style">Пријави се</button>
                </div>
            </form>
            </div>
        </div>
    </div>

    <div class="signin" id="signin">
        <div class="popup-content-position">
            <div class="popup-header">
                <p class="text huge">Регистрација</p>
                <button id="closeSignin" class="button-style">X</button>
            </div>
            <div class="popup-content">
            <form action="#" method="post">
                <div class="label-above-input">
                    <label for="signin-ime" class="text">Име:</label>
                    <input type="text" id="signin-ime" name="ime" class="input-style"><br>
                </div>
                <div class="label-above-input">
                    <label for="signin-lozinka" class="text">Лозинка:</label>
                    <input type="password" id="signin-lozinka" name="lozinka" class="input-style"><br>
                </div>
                <div class="popup-button-container">
                    <button type="submit" class="button-style">Региструј се</button>
                </div>
            </form>
            </div>
        </div>
    </div>

<div class="sidebar">
    <div class="sidebar-content">
            <div class="navigation-part">
                <p class="text big">Навигација</p>
                <div class="nav-links">
                    <a href="profile.html" class="nav-link">➜ Профил</a>
                    <a href="lista-knjiga.html" class="nav-link">➜ Књиге</a>
                    <a href="admin-lista-knjiga.html" class="nav-link"> ➜ Админ књиге</a>
                    <a href="author-list.html" class="nav-link active">➜ Аутори</a>
                    <a href="author-admin-list.html" class="nav-link"> ➜ Админ аутори</a>
                </div>
            </div>
        <div class="search-part">
            <p class="text big">Претрага аутора</p>
            <form action="#" method="get">
                <div class="name-search">
                    <div class="label-above-input">
                        <label for="pretraga" class="text">Претражи по имену:</label>
                        <div class="search-bar">
                            <input type="text" id="pretraga" name="pretraga" placeholder="Унеси име или презиме" class="input-style">
                            <button type="submit" class="image-button"><img src="content/Search.png" alt="Претрага" class="button-image"></button>
                        </div>
                    </div>
                </div>
                    <p class="text">Филтрирај по статусу:</p>
                <div class="status-search">
                    <div class="checkbox-group">
                        <input type="checkbox" id="status-aktivan" name="status" value="aktivan">
                        <label for="status-aktivan" class="text">Активан</label>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="status-u-penziji" name="status" value="u-penziji">
                        <label for="status-u-penziji" class="text">У пензији</label>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="status-preminuo" name="status" value="preminuo">
                        <label for="status-preminuo" class="text">Преминуо</label>
                    </div>
                </div>
            </form>

        </div>
    </div>
</div>


<main>
    <div class="banner">
        <p class="text huge thick">Упознајте оне који <span class="highlight">стварају</span></p>
    </div>

    <div class="container ">
        <button onclick="goToAutor()" class="item">
            <div class="item-image-container">
                <img src="content/slike-autora/sekspir.jpg" alt="Аутор" class="item-image">
            </div>
            <div class="item-text-container">
                <div class="item-top-text">
                    <div class="item-element">
                        <p class="text big">Вилијам Шекспир</p>
                    </div>
                    <div class="item-element stacked">
                        <p class="text">Датум рођења:</p>
                        <p class="text">15.06.1980.</p>
                    </div>
                    <div class="item-element">
                        <p class="text">Преминуо</p>
                    </div>
                    <div class="item-element stacked">
                        <p class="text">Написано:</p>
                        <p class="text">15</p>
                    </div>
                    <div class="item-element stacked">
                        <p class="text">Награде:</p>
                        <p class="text">3</p>
                    </div>
                </div>
                <div class="item-description-text">
                    <p class="text faded">Шекспир је енглески драматург и песник који се сматра једним од најважнијих писаца у историји књижевности. Његове драме и сонети истражују универзалне теме као што су љубав, моћ, издаја и људска природа. Дела попут Хамлета и Ромеа и Јулије и данас се изводе широм света и имају огроман културни утицај.</p>
                </div>
            </div>
        </button>
        <button onclick="goToAutor()" class="item">
            <div class="item-image-container">
                <img src="content/slike-autora/kafka.jpg" alt="Аутор" class="item-image">
            </div>
            <div class="item-text-container">
                <div class="item-top-text">
                    <div class="item-element">
                        <p class="text big">Франц Кафка</p>
                    </div>
                    <div class="item-element stacked">
                        <p class="text">Датум рођења:</p>
                        <p class="text">15.06.1980.</p>
                    </div>
                    <div class="item-element">
                        <p class="text">Преминуо</p>
                    </div>
                    <div class="item-element stacked">
                        <p class="text">Написано:</p>
                        <p class="text">15</p>
                    </div>
                    <div class="item-element stacked">
                        <p class="text">Награде:</p>
                        <p class="text">3</p>
                    </div>
                </div>
                <div class="item-description-text">
                    <p class="text faded">Кафкине приче и романи познати су по осећају апсурда, отуђености и беспомоћности појединца у модерном друштву. У делима као што су Процес и Преображај, ликови се често суочавају са нелогичним и необјашњивим системима који их гуше. Његов стил је мрачан, симболичан и психолошки интензиван.</p>
                </div>
            </div>
        </button>
        <button onclick="goToAutor()" class="item">
            <div class="item-image-container">
                <img src="content/slike-autora/dostojevski.jpg" alt="Аутор" class="item-image">
            </div>
            <div class="item-text-container">
                <div class="item-top-text">
                    <div class="item-element">
                        <p class="text big">Федор Достојевски</p>
                    </div>
                    <div class="item-element stacked">
                        <p class="text">Датум рођења:</p>
                        <p class="text">15.06.1980.</p>
                    </div>
                    <div class="item-element">
                        <p class="text">Преминуо</p>
                    </div>
                    <div class="item-element stacked">
                        <p class="text">Написано:</p>
                        <p class="text">15</p>
                    </div>
                    <div class="item-element stacked">
                        <p class="text">Награде:</p>
                        <p class="text">3</p>
                    </div>
                </div>
                <div class="item-description-text">
                    <p class="text faded">Достојевски је руски писац познат по дубокој психолошкој анализи ликова и моралним дилемама. Његова дела често истражују теме кривице, вере, патње и унутрашњих конфликата. Романи као што су Злочин и казна и Браћа Карамазови сматрају се врхунским делима светске књижевности због начина на који приказују људску психу.</p>
                </div>
            </div>
        </button>
        <button onclick="goToAutor()" class="item">
            <div class="item-image-container">
                <img src="content/slike-autora/orvel.jpg" alt="Аутор" class="item-image">
            </div>
            <div class="item-text-container">
                <div class="item-top-text">
                    <div class="item-element">
                        <p class="text big">Џорџ Орвел</p>
                    </div>
                    <div class="item-element stacked">
                        <p class="text">Датум рођења:</p>
                        <p class="text">15.06.1980.</p>
                    </div>
                    <div class="item-element">
                        <p class="text">Преминуо</p>
                    </div>
                    <div class="item-element stacked">
                        <p class="text">Написано:</p>
                        <p class="text">15</p>
                    </div>
                    <div class="item-element stacked">
                        <p class="text">Награде:</p>
                        <p class="text">3</p>
                    </div>
                </div>
                <div class="item-description-text">
                    <p class="text faded">Орвел је енглески писац познат по политичкој сатири и критиковању тоталитаризма. У романима 1984 и Животињска фарма приказује опасности диктатуре, пропаганде и контроле друштва. Његова дела су јасна, директна и често служе као упозорење о злоупотреби моћи.</p>
                </div>
            </div>
        </button>
        <button onclick="goToAutor()" class="item">
            <div class="item-image-container">
                <img src="content/slike-autora/tolstoj.jpg" alt="Аутор" class="item-image">
            </div>
            <div class="item-text-container">
                <div class="item-top-text">
                    <div class="item-element">
                        <p class="text big">Лев Толстој</p>
                    </div>
                    <div class="item-element stacked">
                        <p class="text">Датум рођења:</p>
                        <p class="text">15.06.1980.</p>
                    </div>
                    <div class="item-element">
                        <p class="text">Преминуо</p>
                    </div>
                    <div class="item-element stacked">
                        <p class="text">Написано:</p>
                        <p class="text">15</p>
                    </div>
                    <div class="item-element stacked">
                        <p class="text">Награде:</p>
                        <p class="text">3</p>
                    </div>
                </div>
                <div class="item-description-text">
                    <p class="text faded">Толстој је један од највећих руских и светских реалиста, познат по огромним романима који приказују друштво, историју и људске односе. У делима као што су Рат и мир и Ана Карењина детаљно описује животе ликова у контексту великих историјских догађаја и моралних питања. Његов стил је широк, детаљан и дубоко филозофски.</p>
                </div>
            </div>
        </button>
    </div>

</main>
<script src="function.js"></script>
</body>
</html>
